services:
  ipa-signer:
    build: .
    container_name: cook-ipa
    stop_grace_period: 3s
    ports:
      - "5005:5005"
    volumes:
      # Persistent data
      - ./certs:/app/certs
      - ./builds:/app/builds
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - PORT=5005
      - HOST=0.0.0.0
      - CERTS_DIR=/app/certs
      - LOGS_DIR=/app/logs
      # S3 (set via .env: S3_ACCESS_KEY, S3_SECRET_KEY, S3_ENDPOINT, S3_REGION, S3_BUCKET, S3_PREFIX, S3_EXTERNAL_DOMAIN)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
